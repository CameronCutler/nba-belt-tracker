services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nba-belt-app
    ports:
      - "8080:80"
    volumes:
      - db_data:/var/www/database
    environment:
      - BALLDONTLIE_API_KEY=${BALLDONTLIE_API_KEY}
      - DB_PATH=/var/www/database/belt.db
      - ENVIRONMENT=development

volumes:
  db_data:
